---
# =============================================================
# Build MegaLinter Custom Flavor Workflow
#
# This workflow builds and publishes a custom MegaLinter Docker image
# to GitHub Container Registry (ghcr.io) and optionally Docker Hub.
#
# Usage:
# - Triggers on push, release, or manual dispatch.
# - Tags the image with the release tag (on release) or 'alpha' (otherwise).
# - Pushes to ghcr.io and, if credentials are set, to Docker Hub.
#
# Required repository secrets:
#   - GITHUB_TOKEN: Provided by GitHub Actions (for ghcr.io push)
#   - DOCKERHUB_USERNAME: (optional) Docker Hub username for push
#   - DOCKERHUB_PASSWORD: (optional) Docker Hub password/token for push
#
# Optional repository variables:
#   - DOCKERHUB_REPO: Docker Hub repository name (e.g. nvuillam)
#
# The MegaLinter custom flavor image will be available at:
#   - ghcr.io/<owner>/<repo>:<tag>
#   - docker.io/<dockerhub_repo>/<repo>:<tag> (if Docker Hub credentials are set)
# =============================================================
name: Build & Push MegaLinter Custom Flavor

on:
  push:
    branches-ignore: [main]
  release:
    types: [edited, published]
  workflow_dispatch:
    inputs:
      megalinter-version:
        description: "MegaLinter version to build (e.g., v9.4.0)"
        required: false
        type: string
      is-latest:
        description: "Mark this version as latest"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-custom-flavor:
    name: Build Custom MegaLinter Flavor (${{ matrix.platform }})
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine MegaLinter Version Tag
        id: determine-tag
        run: |
          if [ -n "${{ inputs.megalinter-version }}" ]; then
            TAG="${{ inputs.megalinter-version }}"
            echo "Using workflow input version: $TAG"
          elif [ "${{ github.event_name }}" == "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            echo "Using release tag: $TAG"
          else
            TAG="beta"
            echo "Using default tag: $TAG"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          # Determine is-latest flag
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            IS_LATEST="${{ inputs.is-latest }}"
            echo "Using workflow input is-latest: $IS_LATEST"
          elif [ "${{ github.event_name }}" == "release" ]; then
            IS_LATEST="true"
            echo "Release event - is-latest: true"
          else
            IS_LATEST="false"
            echo "Default is-latest: false"
          fi
          echo "is-latest=$IS_LATEST" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Docker Hub credentials
        id: dockerhub-creds
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_PASSWORD }}" ]; then
            echo "has-creds=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-creds=false" >> "$GITHUB_OUTPUT"
          fi

      # Log in to Docker Hub only if credentials are provided
      - name: Log in to Docker Hub
        if: ${{ steps.dockerhub-creds.outputs.has-creds == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build custom flavor image
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock:rw \
            -v "$GITHUB_WORKSPACE":/github/workspace \
              -e GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
              -e CUSTOM_FLAVOR_PLATFORM="${{ matrix.platform }}" \
              -e CUSTOM_FLAVOR_BUILD_REPO="${{ github.repository }}" \
              -e CUSTOM_FLAVOR_BUILD_REPO_URL="${{ github.repositoryUrl }}" \
              -e CUSTOM_FLAVOR_BUILD_USER="${{ github.actor }}" \
            "ghcr.io/oxsecurity/megalinter-custom-flavor-builder:${{ steps.determine-tag.outputs.tag }}"

      - name: Tag and push image
        run: |
          IMAGE_NAME=$(echo "${{ github.repository }}" | tr '/' '_')
          IMAGE_VERSION=$(docker inspect --format='{{index .Config.Labels "org.opencontainers.image.version"}}' "$IMAGE_NAME")
          GHCR_IMAGE="ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/megalinter-custom-flavor"

          echo "Custom flavor image name: $IMAGE_NAME"
          echo "Custom flavor image version: $IMAGE_VERSION"

          docker tag "$IMAGE_NAME" "$GHCR_IMAGE:$IMAGE_VERSION"
          docker push "$GHCR_IMAGE:$IMAGE_VERSION"

          if [ "${{ steps.determine-tag.outputs.is-latest }}" = "true" ]; then
            docker tag "$IMAGE_NAME" "$GHCR_IMAGE:latest"
            docker push "$GHCR_IMAGE:latest"
          fi

          if [ "${{ steps.dockerhub-creds.outputs.has-creds }}" = "true" ]; then
            if [ -n "${{ vars.DOCKERHUB_REPO }}" ]; then
              DOCKERHUB_IMAGE="${{ vars.DOCKERHUB_REPO }}/${{ github.event.repository.name }}-megalinter-custom-flavor"
            else
              DOCKERHUB_IMAGE="${{ github.repository_owner }}/${{ github.event.repository.name }}-megalinter-custom-flavor"
            fi

            docker tag "$IMAGE_NAME" "$DOCKERHUB_IMAGE:$IMAGE_VERSION"
            docker push "$DOCKERHUB_IMAGE:$IMAGE_VERSION"

            if [ "${{ steps.determine-tag.outputs.is-latest }}" = "true" ]; then
              docker tag "$IMAGE_NAME" "$DOCKERHUB_IMAGE:latest"
              docker push "$DOCKERHUB_IMAGE:latest"
            fi
          fi
